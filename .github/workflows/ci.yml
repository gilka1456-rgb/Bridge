name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-and-static-audit:
    name: Web build and static audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: core/web/package-lock.json
      - name: Static audit
        run: ./scripts/static_audit.sh
      - name: Web install
        run: npm --prefix core/web ci
      - name: Web tests
        run: npm --prefix core/web run test:run
      - name: Web build
        run: |
          npm --prefix core/web run build

  ios-compile:
    name: iOS compile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static audit
        run: ./scripts/static_audit.sh
      - name: Xcode build without signing
        run: |
          xcodebuild \
            -project Bridge.xcodeproj \
            -scheme Bridge \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
